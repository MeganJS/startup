
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <!--this should keep things from scaling automatically-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Workbench</title>
        <!--link to css file-->
        <link rel="stylesheet" href="main.css" />
        <!--bootstrap css info-->
        <link 
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous"
        />
        <!--bootstrap icon info-->
        <link 
            rel="stylesheet" 
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css"
        />
    </head>
    <body>
        <!--this should include js-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
        <header>
            <div class="navbar">
                <div class="container-fluid d-flex justify-content-center">
                    <div class="navbar-brand fs-3 pe-2">writ360 + Workbench</div>
                    <div class="navbar">
                        <ul class="navbar-nav d-flex flex-row gap-3 fs-4">
                            <li class="nav-item">
                                <a class="nav-link" href="home.html">home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="workbench.html">workbench</a>
                            </li>
                            <!--
                            <li class="nav-item">
                                <a class="nav-link" href="goals.html">goals</a>
                            </li>
                        -->
                            <li class="nav-item">
                                <a class="nav-link" href="index.html">logout</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <!--project controls-->
            <div id="projectControls">
                <div id="projectTitle" style="display:flex;">
                    <h3 class="m-1" style="text-decoration: underline;" id="nameOfProject">
                        593 and the Dolphins
                    </h3>
                    <img src="q-mark.png" class="rounded-circle border border-2 m-1" alt="q-mark" id="repImage">
                    <button type="button" class="btn bg-white btn-sm" aria-label="edit" id="editProjectName">
                        <i class="bi bi-pencil-square bg-transparent m-0 p-0"></i>
                    </button>
                </div>
                <div id="projectTitleEdit" style="display:none;">
                    <input type="text" class="form-control" id="projectTitleInput" placeholder="project title" aria-label="project title">
                    <input class="btn btn-info btn-sm" type="button" value="Apply" aria-label="Apply" id="saveNewTitle">
                    <input class="btn btn-dark btn-sm" type="button" value="Cancel" aria-label="Cancel" id="cancelNewTitle">
                </div>
                <div id="projectSettings">
                    <i class="bi bi-gear-fill bg-transparent m-1 h4"></i>
                    <div class="dropdown m-1">
                        <button class="btn btn-secondary dropdown toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Project List
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item bg-white" href="#">Project 1</a></li>
                            <li><a class="dropdown-item bg-white" href="#">2nd Project</a></li>
                            <li><a class="dropdown-item bg-white" href="#">593 and the Dolphins</a></li>
                            <li><a class="dropdown-item bg-white" href="#">Create New Project</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            <!--work area-->
            <div class="container-fluid" id="workAreaHome">
                <div id="workArea">
                    <div id="displayArea">
                        <div id="toolbar">
                            <button type="button" class="btn btn-success" aria-label="add-block" id="addBlockBtn">add building block</button>
                        </div>
                        <div id="building-block-stage">
                            <div class="card" id="building-block" style="display:flex;">
                                <div id="bb-label-element">
                                    Element
                                    <button type="button" class="btn btn-outline-light btn-sm p-0" aria-label="edit-card" id="editCardBtn">
                                        <i class="bi bi-pencil-square bg-transparent m-0 p-0" style="color:white;"></i>
                                    </button>
                                </div>
                                <!--
                                <img src="q-mark.png" class="rounded-circle border border-2 m-1" alt="q-mark" id="repImage" style="align-self: center;">
                                -->
                                <div class="bg-transparent" style="align-self: center;">
                                    Dolphin City
                                </div>
                                <div class="container-fluid p-1" id="bb-tags">
                                    +Frog +St. Louis
                                </div>
                            </div>

                            <div class="card" id="building-block" style="display:flex;">
                                <div id="bb-label-person" aria-label="Person">
                                    Person
                                    <button type="button" class="btn btn-outline-dark btn-sm p-0" aria-label="edit-block" id="editBlockBtn">
                                        <i class="bi bi-pencil-square bg-transparent m-0 p-0" style="color:black;"></i>
                                    </button>
                                </div>
                                <!--
                                <img src="q-mark.png" class="rounded-circle border border-2 m-1" alt="q-mark" id="repImage" style="align-self: center;">
                                -->
                                <div class="bg-transparent" style="align-self: center;">
                                    ???
                                </div>
                                <div class="container-fluid p-1" id="bb-tags">
                                    +Smiley Face +Dolphin City +Hendrisk
                                </div>
                            </div>

                            <div class="card" id="building-block-edit" style="display: none;">
                                <select class="form-select form-select-sm" aria-label="block-type-select" id="block-type-select">
                                    <option selected value="Element" aria-label="Element" style="background-color:dimgrey; color:white;">
                                        Element
                                    </option>
                                    <option value="Person" aria-label="Person" style="background-color: darkturquoise; color: white;">
                                        Person
                                    </option>
                                </select>
                                
                                <input type="text" class="form-control" id="blockTitleInput" placeholder="block name" aria-label="name of block">

                                <div class="container-fluid bg-transparent p-1" style="display:flex; justify-content:space-between;" id="buttonHolder">
                                    <button type="button" class="btn btn-success btn-sm p-0" aria-label="save block" id="saveBlockBtn">
                                        <i class="bi bi-check-square bg-transparent m-0 p-0" style="color:black;"></i>
                                    </button>
                                    <button type="button" class="btn btn-warning btn-sm p-0" aria-label="return-from-block" id="returnBlockBtn">
                                        <i class="bi bi-arrow-return-left bg-transparent m-0 p-0" style="color:black;"></i>
                                    </button>
                                    <button type="button" class="btn btn-danger btn-sm p-0" aria-label="delete block" id="deleteBlockBtn">
                                        <i class="bi bi-trash bg-transparent m-0 p-0" style="color:black;"></i>
                                    </button>
                                </div>
                                
                                <!--
                                <img src="q-mark.png" class="rounded-circle border border-2 m-1" alt="q-mark" id="repImage" style="align-self: center;">
                                -->
                                <div class="container-fluid p-1" id="bb-tags">
                                    <button type="button" class="btn btn-light btn-sm" aria-label="connect" id="connectBtn">+connect</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="editArea">
                        <h4>
                            Outline
                            <button type="button" class="btn btn-success m-2">+ block</button>
                        </h4>
                        <textarea class="form-control" id="outlineTextArea" rows="14"></textarea>
                        <button type="button" class="btn btn-danger m-2">save</button>
                    </div>
                </div>
            </div>
        </main>
        <footer class="position-absolute bottom-0">
            <div class="container-fluid">
                Made by Megan S.
            </div>
        </footer>
        <!--script goes here because js references html elements during initialization-->
        <script src="workbench.js"></script>
    </body>
</html>
