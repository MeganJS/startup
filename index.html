<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <!--this should keep things from scaling automatically-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LOGIN</title>
        <!--link to css file-->
        <link rel="stylesheet" href="main.css" />
        <!--bootstrap css info-->
        <link 
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous"
        />
    </head>
    <body>
        <header class="d-flex align-items-center">
            <p class="h2 fw-bold p-3">writ360 + Login</p>
        </header>
        <main class="d-flex align-items-center justify-content-center">
            <div class="col-3 p-3 text-center">
                <h1 class="display-2">Hi!</h1>
                <div class="h4">Welcome to writ360, an organizational tool for story creators.</div>
            </div>
            <div class="col-3 p-3 text-center">
                <h2 class="h2">Login</h2>
                <div class="form-floating mb-3" id="inputField">
                    <input type="text" class="form-control" id="floatingName" placeholder="username" aria-label="username">
                    <label for="floatingName" class="bg-transparent">username</label>
                </div>
                <div class="form-floating mb-3" id="inputField">
                    <input type="text" class="form-control" id="floatingPassword" placeholder="password" aria-label="password">
                    <label for="floatingPassword" class="bg-transparent">password</label>
                </div>
                <!--submit button will be (for now) a link to homepage-->
                <a class="btn btn-info" href="home.html" role="button">Submit</a>
                <!--sign up button will do nothing for now-->
                <input class="btn bg-black" type="button" value="Sign Up" style="color:white;">
            </div>
        </main>
        <footer class="position-absolute bottom-0">
            <div class="container-fluid">
                Made by Megan S.
            </div>
        </footer>
    </body>
</html>
