<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <!--this should keep things from scaling automatically-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GOALS</title>
        <!--link to css file-->
        <link rel="stylesheet" href="main.css" />
        <!--bootstrap css info-->
        <link 
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous"
        />
        <!--bootstrap icon info-->
        <link 
            rel="stylesheet" 
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css"
        />
    </head>
    <body>
        <header>
            <div class="navbar">
                <div class="container-fluid d-flex justify-content-center">
                    <div class="navbar-brand fs-3 pe-2">writ360 + Goals</div>
                    <div class="navbar">
                        <ul class="navbar-nav d-flex flex-row gap-3 fs-4">
                            <li class="nav-item">
                                <a class="nav-link" href="home.html">home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="workbench.html">workbench</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="goals.html">goals</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="index.html">logout</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </header>
        <main>
            <h1 class="container-fluid d-flex justify-content-center border border-2 border-info">Goals</h1>
            <div class="goalsLayout">
                <!--active goal-->
                <div class="container-fluid m-3">
                    <div class="card p-3">
                        <div class="form-check form-check-inline bg-white">
                            <input class="form-check-input" type="checkbox" value="" id="flexCheckbox">
                            <h5 class="card-title bg-white">Goal Title</h5>
                        </div>
                        <p class="card-text bg-white">description of goal</p>
                        <div class="btn-group-sm bg-white" role="group" id="cardControls">
                            <button type="button" class="btn" aria-label="edit">
                                <i class="bi bi-pencil-square bg-transparent"></i>
                            </button>
                            <button type="button" class="btn btn-info" data-bs-toggle="button" aria-label="pin">
                                <i class="bi bi-pin-fill bg-transparent"></i>
                            </button>
                            <button type="button" class="btn bg-black" aria-label="delete">
                                <i class="bi bi-trash bg-transparent"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card p-2 m-3">
                        <div class="form-check form-check-inline bg-white">
                            <input class="form-check-input" type="checkbox" value="" id="flexCheckbox">
                            <h5 class="card-title bg-white">Step1</h6>
                        </div>
                        <p class="card-text bg-white">description of step</p>
                        <div class="btn-group-sm bg-white" role="group" id="cardControls">
                            <button type="button" class="btn" aria-label="edit">
                                <i class="bi bi-pencil-square bg-transparent"></i>
                            </button>
                            <button type="button" class="btn btn-info" data-bs-toggle="button" aria-label="pin">
                                <i class="bi bi-pin-fill bg-transparent"></i>
                            </button>
                            <button type="button" class="btn bg-black" aria-label="delete">
                                <i class="bi bi-trash bg-transparent"></i>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="btn" aria-label="addStep">
                        <h4>
                            <i class="bi bi-plus-circle bg-transparent"></i>
                            Add Step
                        </h4>
                    </button>
                </div>
                <!--add goal-->
                <div class="container-fluid m-3 d-flex justify-content-center align-items-start">
                        <button type="button" class="btn" aria-label="addGoal">
                            <h2>
                                <i class="bi bi-plus-circle bg-transparent"></i>
                                Add Goal
                            </h2>
                        </button>
                </div>
                <!--add goal-->
                <div class="container-fluid m-3 d-flex justify-content-center align-items-start">
                    <button type="button" class="btn" aria-label="addGoal">
                        <h2>
                            <i class="bi bi-plus-circle bg-transparent"></i>
                            Add Goal
                        </h2>
                    </button>
                </div>
            </div>
            

        </main>
        <footer class="position-absolute bottom-0">
            <div class="container-fluid">
                Made by Megan S.
            </div>
        </footer>
    </body>
</html>
