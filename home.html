<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <!--this should keep things from scaling automatically-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>HOME</title>
        <!--link to css file-->
        <link rel="stylesheet" href="main.css" />
        <!--bootstrap css info-->
        <link 
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous"
        />
        <!--bootstrap icon info-->
        <link 
            rel="stylesheet" 
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css"
        />

    </head>
    <body>
        <!--this should include js-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
        
        <header>
            <div class="navbar">
                <div class="container-fluid d-flex justify-content-center">
                    <div class="navbar-brand fs-3 pe-2">writ360 + Home</div>
                    <div class="navbar">
                        <ul class="navbar-nav d-flex flex-row gap-3 fs-4">
                            <li class="nav-item">
                                <a class="nav-link" href="home.html">home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="workbench.html">workbench</a>
                            </li>
                            <!--
                            <li class="nav-item">
                                <a class="nav-link" href="goals.html">goals</a>
                            </li>
                            -->
                            <li class="nav-item">
                                <a class="nav-link" href="index.html">logout</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </header>
        <main>
            <div class="container-fluid" id="profile">
                <img src="q-mark.png" class="rounded-circle border border-2" alt="q-mark" id="repImage">
                <h3 class="bg-transparent m-1" id="profileName">

                </h3>
                </h3>
                <div class="container-fluid bg-transparent m-1" id="profileSettings">
                    <i class="bi bi-gear-fill bg-transparent m-1 h4"></i>
                    <input type="color" class="form-control form-control-color m-1" id="colorInput" title="choose a color">
                </div>
            </div>

            <div class="homeLayout">
                <!--
                <div class="container-fluid" id="dashboard">
                    <div class="card m-2" id="pinPlace">
                        <i class="bi bi-plus-circle bg-transparent p-2 h1"></i>
                    </div>
                    <div class="card m-2" id="pinPlace">
                        <i class="bi bi-plus-circle bg-transparent p-2 h1"></i>
                    </div>
                    <div class="card m-2" id="pinPlace">
                        <i class="bi bi-plus-circle bg-transparent p-2 h1"></i>
                    </div>
                    <div class="card m-2" id="pinPlace">
                        <i class="bi bi-plus-circle bg-transparent p-2 h1"></i>
                    </div>
                </div>
                -->
                <!--project info-->
                <div class="container-fluid m-3" style="max-width: 400px;">
                    <ul class="list-group" id="projectList">
                        <li class="list-group-item" id="projectListHeader">
                            Projects
                        </li>
                        <li class="list-group-item">
                            <a href="workbench.html" class="link-dark bg-transparent">Project 1</a>
                        </li>
                        <li class="list-group-item">
                            <a href="workbench.html" class="link-dark bg-transparent">2nd Project</a>
                        </li>
                        <li class="list-group-item">
                            <a href="workbench.html" class="link-dark bg-transparent">593 and the Dolphins</a>
                        </li>
                        <li class="list-group-item">
                            <i class="bi bi-plus-circle bg-transparent pe-1"></i>
                            <a href="workbench.html" class="link-dark bg-transparent">Create New Project</a>
                            <i class="bi bi-plus-circle bg-transparent ps-1"></i>
                        </li>
                    </ul>
                </div>
                
                <!--friend info-->
                <div class="container-fluid m-3" style="max-width: 400px;">
                    <div class="accordion" id="friendList">
                        <div class="accordion-item">
                            <h4 class="accordion-header bg-white p-2" id="friendsListHeader">
                                Friends and Associates
                            </h4>
                        </div>
                        <div class="accordion-item">
                            <h4 class="accordion-header" id="friendHeader1">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                    data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
                                    Friend Frensdatter
                                </button>
                            </h4>
                            <div id="collapseOne" class="accordion-collapse collapse" aria-labelledby="friendHeader1"
                                data-bs-parent="#friendList">
                                <div class="accordion-body bg-white">
                                    <div class="btn-group-sm bg-transparent" role="group" id="friendControls">
                                        <button type="button" class="btn btn-outline-info" aria-label="chat">converse</button>
                                        <button type="button" class="btn btn-outline-dark" aria-label="vanish">vanish</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="accordion-item">
                            <h4 class="accordion-header" id="friendHeader2">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                    data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                                    Aurtura Glenki
                                </button>
                            </h4>
                            <div id="collapseTwo" class="accordion-collapse collapse" aria-labelledby="friendHeader2"
                                data-bs-parent="#friendList">
                                <div class="accordion-body bg-white">
                                    <div class="btn-group-sm bg-transparent" role="group" id="friendControls">
                                        <button type="button" class="btn btn-outline-info" aria-label="chat">converse</button>
                                        <button type="button" class="btn btn-outline-dark" aria-label="vanish">vanish</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="accordion-item">
                            <h4 class="accordion-header" id="friendHeader3">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                    data-bs-target="#collapseThree" aria-expanded="false" aria-controls="collapseThree">
                                    <i class="bi bi-plus-circle bg-transparent pe-2"></i>
                                    Request New Association
                                    <i class="bi bi-plus-circle bg-transparent ps-2"></i>
                                </button>
                            </h4>
                            <div id="collapseThree" class="accordion-collapse collapse" aria-labelledby="friendHeader3"
                                data-bs-parent="#friendList">
                                <div class="accordion-body bg-white">
                                    <div class="input-group mb-3 bg-transparent">
                                        <input type="text" class="form-control" placeholder="friend username" aria-label="friend username" id="friendName" aria-describedby="request-button">
                                        <button type="button" class="btn btn-outline-info" id="request-button">request</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!--need to add alert for when usename is incorrect-->
                    </div>
                </div>
                
            </div>
            
        </main>
        <footer class="position-absolute bottom-0">
            <div class="container-fluid">
                Made by Megan S.
            </div>

        <!--script goes here because js references html elements during initialization-->
        <script src="home.js"></script>
    </body>
</html>
